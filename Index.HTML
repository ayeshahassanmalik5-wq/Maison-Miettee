<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/styles.css">
    <script defer src="js/script.js"></script>
    <title>Chic Bites</title>
</head>
<body>
    <header>
        <h1>Chic Bites</h1>
        <div class="welcome-message">Welcome! Enjoy your meal!</div>
    </header>
    
    <main>
        <div class="gallery">
            <img src="images/salmon-sushi.jpg" alt="Cooked Salmon Sushi" class="food-item">
            <img src="images/shrimp-sushi.jpg" alt="Shrimp Sushi" class="food-item">
            <img src="images/low-calorie-burger.jpg" alt="Low-Calorie Burger" class="food-item">
            <img src="images/pretzels.jpg" alt="Pretzels" class="food-item">
            <img src="images/alfredo-fettuccine.jpg" alt="Alfredo Fettuccine Pasta" class="food-item">
            <!-- Add additional images as needed -->
        </div>
        <button class="add-to-cart">Add to Cart</button>
    </main>

    <footer>
        <div class="countdown">Countdown: <span id="timer"></span></div>
    </footer>
</body>
</html>
